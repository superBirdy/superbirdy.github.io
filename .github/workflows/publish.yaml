For on-site visits to agencies like DOE, DARPA, or NSF centers (e.g., CURB), those are not conferences or seminars. On a CV they are usually presented as invited talks or invited briefings.

The key principle in academic CVs:
You should signal that you were invited to present, not that it was an interview or proposal meeting.

Most common wording
Option 1 — Invited Briefing (common for agencies)
\noindent Invited Briefing, U.S. Department of Energy (DOE) \hfill 2024

