The error
Your build fails because your workflow uses a deprecated GitHub Action:

Error: This request has been automatically failed because it uses a deprecated version of `actions/upload-artifact: v3`
GitHub disabled v3 in April 2024, so any workflow using it now fails immediately.

Your site probably uses a workflow like:

.github/workflows/deploy.yml
or

.github/workflows/hugo.yml
and inside it there is a line like:

uses: actions/upload-artifact@v3
Fix (very easy)
1️⃣ Go to your repository
Open:

.github/workflows/
Find the workflow file (usually one of these):

deploy.yml
pages.yml
hugo.yml
build.yml
2️⃣ Edit the file
Change:

uses: actions/upload-artifact@v3
to

uses: actions/upload-artifact@v4
3️⃣ Commit the change
Click Commit changes.

GitHub will automatically rebuild the website.

Example of the fixed block
Before:

- name: Upload artifact
  uses: actions/upload-artifact@v3
  with:
    name: github-pages
    path: ./public
After:

- name: Upload artifact
  uses: actions/upload-artifact@v4
  with:
    name: github-pages
    path: ./public
Why this happened
Your template probably came from:

academicpages

Hugo academic

old GitHub Pages template

Those templates still use artifact v3, which GitHub has now deprecated.

After fixing
You should see:

✔ build
✔ deploy
and the site will update normally.

