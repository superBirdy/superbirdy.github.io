Got it — the issue you circled is not tabular padding anymore. The indent comes from the p{} column type, which creates a paragraph box with its own left margin.

To remove that extra left offset and make the text start exactly under the section title, switch from p{} to l and control spacing using \hfill.

Correct Fix (No Left Indent, Clean Alignment)
\section{SELECTED PRESENTATIONS}
\noindent\makebox[\linewidth]{\rule{\textwidth}{0.2pt}}

\vspace{4pt}

\begin{tabular*}{\textwidth}{@{}l@{\extracolsep{\fill}}r@{}}
Agricultural and Applied Economics Association (AAEA) Annual Meeting & 2025, 2026 \\
United States Association for Energy Economics (USAEE) Conference & 2023, 2024 \\
Institute for Northwest Energy Futures Seminar, Washington State University & 2025 \\
University of Arkansas Seminar & 2025 \\
Binational Educational Symposium on Climate Change and Agricultural Systems & 2025 \\
Texas A\&M Conference on Energy & 2022 \\
USAEE Conference (Poster Session) & 2022 \\
IAEE Conference & 2021 \\
RBAC Inc. User Conference & 2019 \\
Department of Economics Seminar, University of Texas at Austin & 2019 \\
\end{tabular*}
Why This Works
Key improvements:

tabular*
Forces the table to span exactly the page width.

@{}
Removes all column padding.

@{\extracolsep{\fill}}
Pushes the years all the way to the right margin automatically.

l instead of p{}
Prevents the paragraph indentation problem.

Result
You get exactly what you want:

AAEA Annual Meeting .................................... 2025, 2026
USAEE Conference ....................................... 2023, 2024
text starts flush left

years flush right

no extra margins.

