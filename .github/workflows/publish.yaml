\noindent Invited Seminar, DARPA Program Review \hfill 2024

\noindent Invited Talk, Carbon Utilization Redesign through Biomanufacturing (CURB ERC) \hfill 2024
This works well for research presentations.

Option 3 — Agency Workshops (also common)
\noindent U.S. Department of Energy Workshop on Carbon Utilization \hfill 2024
What you should NOT write
Avoid phrases like:

onsite visit

interview

proposal pitch

program meeting

Those sound administrative rather than academic.

