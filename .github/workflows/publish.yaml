Typical Screening Funnel (for ~250 Applicants)
For a land-grant R1 job like UTK AREC, the search committee usually follows a multi-stage reduction:

Stage	Number of candidates	What happens
Applications received	~250	PhD economists, ag econ, applied econ
Qualified shortlist	~60–80	meet required field and research criteria
Long interview list	~20–30	first-round AAEA / Zoom interviews
Flyout candidates	~3–5	campus visit seminars
Final hire	1	offer accepted
So 250 applicants → 1 hire means an approximate 0.4% acceptance rate.

